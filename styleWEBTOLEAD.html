<style>
  .lead-form-container {
    max-width: 500px;
    margin: 20px auto;
    font-family: Arial, sans-serif;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  .form-header {
    background-color: #0066cc;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
  }
  .form-body {
    padding: 20px;
    background-color: #f9f9f9;
  }
  label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
    color: #333;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box; /* Ensures padding doesn't affect width */
  }
  input[type="submit"] {
    background-color: #0066cc;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
    font-size: 16px;
  }
  input[type="submit"]:hover {
    background-color: #0052a3;
  }
</style>

<div class="lead-form-container">
  <div class="form-header">AVEES BIOCOS LEAD FORM</div>
  
  <form class="form-body" action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DIk000000LFww" method="POST">
    <input type="hidden" name="oid" value="00DIk000000LFww">
    <input type="hidden" name="retURL" value="https://aveesbiocos.com/">

    <label for="first_name">First Name</label>
    <input id="first_name" maxlength="40" name="first_name" type="text" />

    <label for="last_name">Last Name</label>
    <input id="last_name" maxlength="80" name="last_name" type="text" />

    <label for="email">Email</label>
    <input id="email" maxlength="80" name="email" type="text" />

    <label for="phone">Phone</label>
    <input id="phone" maxlength="40" name="phone" type="text" />

    <label for="company">Company</label>
    <input id="company" maxlength="40" name="company" type="text" />

    <label for="city">City</label>
    <input id="city" maxlength="40" name="city" type="text" />

    <label for="state">State/Province</label>
    <input id="state" maxlength="20" name="state" type="text" />

    <label for="zip">Zip</label>
    <input id="zip" maxlength="20" name="zip" type="text" />

    <label for="street">Street</label>
    <textarea name="street" rows="2"></textarea>

    <label for="country">Country</label>
    <input id="country" maxlength="40" name="country" type="text" />

    <label for="description">Description</label>
    <textarea name="description" rows="4"></textarea>

    <input type="submit" name="submit" value="Submit Inquiry">
  </form>
</div>
